<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Entry - DiabetesCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-expand-sm">
    <div class="container">
      <a class="navbar-brand" href="#">DiabetesCare</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/static/dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="/static/log-entry.html">Log Entry</a></li>
          <li class="nav-item"><a class="nav-link" href="/static/history.html">History</a></li>
          <li class="nav-item"><a class="nav-link" href="/static/alerts.html">Alerts</a></li>
        </ul>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="card" style="max-width:540px;margin:0 auto;">
      <div class="card-header">Log New Entry</div>
      <div class="card-body">
        <label class="form-label fw-semibold">Select Type</label>
        <div class="row g-2 mb-4" id="typeButtons">
          <div class="col-3">
            <button class="btn w-100 type-btn" data-type="glucose" style="background:#e8f5e9;color:#2e7d32;border:2px solid transparent;padding:0.75rem 0.5rem;font-weight:600;border-radius:10px;">
              <div style="font-size:1.4rem;">🩸</div>
              <div style="font-size:0.75rem;">Glucose</div>
            </button>
          </div>
          <div class="col-3">
            <button class="btn w-100 type-btn" data-type="meal" style="background:#fff3e0;color:#e65100;border:2px solid transparent;padding:0.75rem 0.5rem;font-weight:600;border-radius:10px;">
              <div style="font-size:1.4rem;">🍽️</div>
              <div style="font-size:0.75rem;">Meal</div>
            </button>
          </div>
          <div class="col-3">
            <button class="btn w-100 type-btn" data-type="medication" style="background:#e3f2fd;color:#1565c0;border:2px solid transparent;padding:0.75rem 0.5rem;font-weight:600;border-radius:10px;">
              <div style="font-size:1.4rem;">💊</div>
              <div style="font-size:0.75rem;">Medication</div>
            </button>
          </div>
          <div class="col-3">
            <button class="btn w-100 type-btn" data-type="exercise" style="background:#f3e5f5;color:#6a1b9a;border:2px solid transparent;padding:0.75rem 0.5rem;font-weight:600;border-radius:10px;">
              <div style="font-size:1.4rem;">🏃</div>
              <div style="font-size:0.75rem;">Exercise</div>
            </button>
          </div>
        </div>

        <form id="entryForm">
          <div class="mb-3" id="valueField">
            <label class="form-label" id="valueLabel">Value</label>
            <input type="number" step="0.1" min="0.1" class="form-control" id="entryValue" required disabled>
          </div>
          <div class="mb-3">
            <label class="form-label">Date &amp; Time</label>
            <input type="datetime-local" class="form-control" id="entryTimestamp">
          </div>
          <div class="mb-3">
            <label class="form-label">Notes (optional)</label>
            <textarea class="form-control" id="entryNotes" rows="2"></textarea>
          </div>
          <div id="entryError" class="alert alert-danger d-none"></div>
          <div id="entrySuccess" class="alert alert-success d-none"></div>
          <button type="submit" class="btn btn-primary w-100" id="entrySubmitBtn" disabled>Save Entry</button>
        </form>
      </div>
    </div>
  </div>

  <footer>&copy; 2026 DiabetesCare</footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/log-entry.js"></script>
</body>
</html>
