<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiabetesCare - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
    <div class="auth-card card">
      <div class="card-body">
        <h2 class="text-center mb-4" style="color:var(--primary); font-weight:700;">DiabetesCare</h2>
        <ul class="nav nav-tabs justify-content-center mb-4" id="authTabs" role="tablist">
          <li class="nav-item">
            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">Sign In</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" id="signup-tab" data-bs-toggle="tab" data-bs-target="#signup" type="button">Sign Up</button>
          </li>
        </ul>
        <div class="tab-content">
          <div class="tab-pane fade show active" id="login">
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="loginEmail" required>
                <div class="text-danger small mt-1 d-none" id="loginEmailError"></div>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="loginPassword" required>
                <div class="text-danger small mt-1 d-none" id="loginPasswordError"></div>
              </div>
              <button type="submit" class="btn btn-primary w-100" id="loginBtn">Sign In</button>
            </form>
          </div>
          <div class="tab-pane fade" id="signup">
            <form id="signupForm">
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" id="signupName" required>
                <div class="text-danger small mt-1 d-none" id="nameError">Name must only contain letters and spaces</div>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="signupEmail" required>
                <div class="text-danger small mt-1 d-none" id="emailError">Please enter a valid email</div>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="signupPassword" required>
                <div class="text-danger small mt-1 d-none" id="passwordError">Password must be at least 6 characters, with 1 uppercase, 1 number, and 1 special character</div>
              </div>
              <div id="signupError" class="alert alert-danger d-none"></div>
              <button type="submit" class="btn btn-primary w-100" id="signupBtn">Sign Up</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
