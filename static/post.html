<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post - DiabetesCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-expand-sm">
    <div class="container">
      <a class="navbar-brand" href="#">DiabetesCare</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/static/dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/static/history.html">History</a></li>
          <li class="nav-item"><a class="nav-link" href="/static/alerts.html">Alerts</a></li>
          <li class="nav-item"><a class="nav-link" href="/static/resources.html">Resources</a></li>
          <li class="nav-item"><a class="nav-link" href="/static/forum.html">Forum</a></li>
        </ul>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <a href="/static/forum.html" class="btn btn-sm btn-outline-secondary mb-3">&larr; Back to Forum</a>

    <div id="loadingPost" class="text-center py-4">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div id="postContent" class="d-none">
      <div class="card mb-4">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <div>
              <span class="badge bg-info mb-2" id="postTopicBadge"></span>
              <h4 class="mb-1" id="postTitle"></h4>
            </div>
            <div class="d-flex gap-1">
              <button class="btn btn-sm btn-outline-secondary report-post-btn">Report</button>
              <button class="btn btn-sm btn-outline-danger d-none" id="deletePostBtn">Delete</button>
            </div>
          </div>
          <p class="text-muted small mb-2">by <span id="postAuthor"></span> &middot; <span id="postDate"></span></p>
          <p class="mb-0" id="postBody" style="white-space:pre-wrap;"></p>
        </div>
      </div>

      <h5 class="mb-3" id="commentCount"></h5>

      <div id="commentsContainer"></div>

      <div class="card mt-4">
        <div class="card-body">
          <h6>Add a Comment</h6>
          <form id="commentForm">
            <input type="hidden" id="parentCommentId" value="">
            <div id="replyInfo" class="d-none alert alert-info py-1 px-2 mb-2 small">
              Replying to <span id="replyTarget"></span>
              <button type="button" class="btn-close float-end" id="cancelReply" style="font-size:0.7rem;"></button>
            </div>
            <textarea class="form-control mb-2" id="commentBody" rows="3" required></textarea>
            <div id="commentError" class="alert alert-danger d-none"></div>
            <button type="submit" class="btn btn-primary btn-sm" id="submitCommentBtn">Post Comment</button>
          </form>
        </div>
      </div>
    </div>

    <div id="postNotFound" class="text-center py-5 d-none">
      <p class="text-muted">Post not found.</p>
      <a href="/static/forum.html" class="btn btn-primary">Back to Forum</a>
    </div>
  </div>

  <!-- Report Modal -->
  <div class="modal fade" id="reportModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Report</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="reportForm">
            <input type="hidden" id="reportTargetType" value="">
            <input type="hidden" id="reportTargetId" value="">
            <div class="mb-3">
              <label class="form-label fw-semibold">Reason</label>
              <textarea class="form-control" id="reportReason" rows="3" required></textarea>
            </div>
            <div id="reportError" class="alert alert-danger d-none"></div>
            <button type="submit" class="btn btn-danger w-100" id="submitReportBtn">Submit Report</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <footer>&copy; 2026 DiabetesCare</footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/post.js"></script>
</body>
</html>
